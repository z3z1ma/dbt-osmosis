          import platform
          import sys
          from packaging.version import Version

          expected_python = "{{.ITEM.python_version}}"
          expected = {
              "dbt-core": "{{.ITEM.dbt_version}}",
              "dbt-duckdb": "{{.ITEM.dbt_version}}",
          }
          minimum = {
              "dbt-adapters": "1.16.3",
          }

          print(f"python: {sys.version}")
          print(f"python executable: {sys.executable}")
          assert platform.python_version().startswith(expected_python + "."), platform.python_version()

          for package in ("dbt-core", "dbt-duckdb", "dbt-adapters", "dbt-osmosis"):
              version = metadata.version(package)
              print(f"{package}: {version}")
              if package in expected:
                  expected_prefix = ".".join(expected[package].split(".")[:2]) + "."
                  assert version.startswith(expected_prefix), f"{package} {version} does not match {expected_prefix}x"
              if package in minimum:
                  assert Version(version) >= Version(minimum[package]), f"{package} {version} is below {minimum[package]}"
          PY
          uv --no-config pip check --python "$MATRIX_ENV/bin/python"
          basedpyright --outputjson > /tmp/dbt-osmosis-basedpyright-{{.ITEM.python_version}}-{{.ITEM.dbt_version}}.json || true
          python -c "import json, pathlib, sys; summary = json.loads(pathlib.Path('/tmp/dbt-osmosis-basedpyright-{{.ITEM.python_version}}-{{.ITEM.dbt_version}}.json').read_text())['summary']; print('basedpyright summary:', summary['errorCount'], 'errors,', summary['warningCount'], 'warnings'); sys.exit(1 if summary['errorCount'] else 0)"
          dbt parse --project-dir demo_duckdb --profiles-dir demo_duckdb -t test
          pytest
        silent: true
      - for:
          matrix:
            python_version: ["3.10", "3.11", "3.12", "3.13"]
            dbt_version: ["1.11.0"]
            dbt_duckdb_version: ["1.10.1"]
        cmd: |
          echo -e "\033[32mtask: [test] basedpyright + pytest (python=={{.ITEM.python_version}}, dbt-core~={{.ITEM.dbt_version}}, dbt-duckdb~={{.ITEM.dbt_duckdb_version}})\033[0m"
          MATRIX_ENV=$(mktemp -d)/dbt-osmosis-matrix
          uv venv --python {{.ITEM.python_version}} "$MATRIX_ENV"
          uv --no-config -q pip install --python "$MATRIX_ENV/bin/python" -e ".[dev,openai]" dbt-core~={{.ITEM.dbt_version}} dbt-duckdb~={{.ITEM.dbt_duckdb_version}} "$DBT_ADAPTERS_CONSTRAINT"
          export VIRTUAL_ENV="$MATRIX_ENV"
          export PATH="$MATRIX_ENV/bin:$PATH"
          uv --version
          python - <<'PY'
          import importlib.metadata as metadata
          import platform
          import sys
          from packaging.version import Version

          expected_python = "{{.ITEM.python_version}}"
          expected = {
              "dbt-core": "{{.ITEM.dbt_version}}",
              "dbt-duckdb": "{{.ITEM.dbt_duckdb_version}}",
          }
          minimum = {
              "dbt-adapters": "1.16.3",
          }

          print(f"python: {sys.version}")
          print(f"python executable: {sys.executable}")
          assert platform.python_version().startswith(expected_python + "."), platform.python_version()

          for package in ("dbt-core", "dbt-duckdb", "dbt-adapters", "dbt-osmosis"):
              version = metadata.version(package)
              print(f"{package}: {version}")
              if package in expected:
                  expected_prefix = ".".join(expected[package].split(".")[:2]) + "."
                  assert version.startswith(expected_prefix), f"{package} {version} does not match {expected_prefix}x"
              if package in minimum:
                  assert Version(version) >= Version(minimum[package]), f"{package} {version} is below {minimum[package]}"
          PY
          uv --no-config pip check --python "$MATRIX_ENV/bin/python"
          basedpyright --outputjson > /tmp/dbt-osmosis-basedpyright-{{.ITEM.python_version}}-{{.ITEM.dbt_version}}.json || true
          python -c "import json, pathlib, sys; summary = json.loads(pathlib.Path('/tmp/dbt-osmosis-basedpyright-{{.ITEM.python_version}}-{{.ITEM.dbt_version}}.json').read_text())['summary']; print('basedpyright summary:', summary['errorCount'], 'errors,', summary['warningCount'], 'warnings'); sys.exit(1 if summary['errorCount'] else 0)"
          dbt parse --project-dir demo_duckdb --profiles-dir demo_duckdb -t test
