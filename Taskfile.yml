# See https://taskfile.dev/installation/ for installation
version: "3"

env:
  UV_PYTHON:
    sh: test -f .python-version && cat .python-version || python -c 'import platform; print(".".join(platform.python_version_tuple()[:2]))'
  DBT_ADAPTERS_CONSTRAINT: "dbt-adapters>=1.16.3,<2.0"

tasks:
  default:
    desc: By default, run format, lint, test
    cmds:
      - task: format
      - task: lock
      - task: lint
      - defer: { task: dev }
      - task: test

  lock:
    desc: Check uv.lock is fresh for pyproject.toml
    cmds:
      - uv lock --check

  lint:
    desc: Run ruff to check code for linting issues
    cmds:
      - uvx ruff check

  format:
    desc: Auto-fix imports, then format code with ruff
    cmds:
      - uvx ruff check --fix --select I
      - uvx ruff format --preview

  dev:
    desc: Sets up dev environment (.venv + pre-commit), syncs dev extra
    deps: [venv, pre-commit]
    cmds:
      - uv -q sync --extra=dev

  venv:
    desc: Creates the virtual environment via uv
    internal: true
    sources:
      - .python-version
    generates:
      - .venv/bin/python
    cmds:
      - uv venv .venv

  pre-commit:
    desc: Installs pre-commit hooks in .git/hooks/pre-commit
    internal: true
    cmds:
      - uv tool install pre-commit
      - uv tool run pre-commit install
    status:
      - test -f .git/hooks/pre-commit

  test:
    desc: Run basedpyright, dbt parse, and pytest against the explicit supported python/dbt matrix
    env:
      UV_NO_PROGRESS: 1
    cmds:
      - uv lock --check
      - for:
          matrix:
            python_version: ["3.10", "3.11", "3.12"]
            dbt_version: ["1.8.0", "1.9.0"]
        cmd: |
          echo -e "\033[32mtask: [test] basedpyright + pytest (python=={{.ITEM.python_version}}, dbt-core~={{.ITEM.dbt_version}}, dbt-duckdb~={{.ITEM.dbt_version}})\033[0m"
          MATRIX_ENV=$(mktemp -d)/dbt-osmosis-matrix
          uv venv --python {{.ITEM.python_version}} "$MATRIX_ENV"
          uv --no-config -q pip install --python "$MATRIX_ENV/bin/python" -e ".[dev,openai]" dbt-core~={{.ITEM.dbt_version}} dbt-duckdb~={{.ITEM.dbt_version}} "$DBT_ADAPTERS_CONSTRAINT"
          export VIRTUAL_ENV="$MATRIX_ENV"
          export PATH="$MATRIX_ENV/bin:$PATH"
          uv --version
          python - <<'PY'
          import importlib.metadata as metadata
          import platform
          import sys
          from packaging.version import Version

          expected_python = "{{.ITEM.python_version}}"
          expected = {
              "dbt-core": "{{.ITEM.dbt_version}}",
              "dbt-duckdb": "{{.ITEM.dbt_version}}",
          }
          minimum = {
              "dbt-adapters": "1.16.3",
          }

          print(f"python: {sys.version}")
          print(f"python executable: {sys.executable}")
          assert platform.python_version().startswith(expected_python + "."), platform.python_version()

          for package in ("dbt-core", "dbt-duckdb", "dbt-adapters", "dbt-osmosis"):
              version = metadata.version(package)
              print(f"{package}: {version}")
              if package in expected:
                  expected_prefix = ".".join(expected[package].split(".")[:2]) + "."
                  assert version.startswith(expected_prefix), f"{package} {version} does not match {expected_prefix}x"
              if package in minimum:
                  assert Version(version) >= Version(minimum[package]), f"{package} {version} is below {minimum[package]}"
          PY
          uv --no-config pip check --python "$MATRIX_ENV/bin/python"
          basedpyright --outputjson > /tmp/dbt-osmosis-basedpyright-{{.ITEM.python_version}}-{{.ITEM.dbt_version}}.json || true
          python -c "import json, pathlib, sys; summary = json.loads(pathlib.Path('/tmp/dbt-osmosis-basedpyright-{{.ITEM.python_version}}-{{.ITEM.dbt_version}}.json').read_text())['summary']; print('basedpyright summary:', summary['errorCount'], 'errors,', summary['warningCount'], 'warnings'); sys.exit(1 if summary['errorCount'] else 0)"
          dbt parse --project-dir demo_duckdb --profiles-dir demo_duckdb -t test
          pytest
        silent: true
      - for:
          matrix:
            python_version: ["3.10", "3.11", "3.12", "3.13"]
            dbt_version: ["1.10.0"]
        cmd: |
          echo -e "\033[32mtask: [test] basedpyright + pytest (python=={{.ITEM.python_version}}, dbt-core~={{.ITEM.dbt_version}}, dbt-duckdb~={{.ITEM.dbt_version}})\033[0m"
          MATRIX_ENV=$(mktemp -d)/dbt-osmosis-matrix
