        silent: true

  test-latest-core-compat:
    desc: Validate basedpyright and full pytest against latest dbt 1.10/1.11 patch drift with the published DuckDB adapter boundary
    env:
      UV_NO_PROGRESS: 1
    cmds:
      - uv lock --check
      - for:
          matrix:
            dbt_version: ["1.10.0"]
            dbt_duckdb_version: ["1.10.0"]
        cmd: |
          echo -e "\033[32mtask: [test-latest-core-compat] validate dbt-core~={{.ITEM.dbt_version}} with dbt-duckdb~={{.ITEM.dbt_duckdb_version}}\033[0m"
          export UV_PYTHON=3.13
          SMOKE_ENV=$(mktemp -d)/dbt-osmosis-smoke
          uv venv "$SMOKE_ENV"
          uv --no-config pip install --python "$SMOKE_ENV/bin/python" -e ".[dev,openai]" "dbt-core~={{.ITEM.dbt_version}}" "dbt-duckdb~={{.ITEM.dbt_duckdb_version}}" "$DBT_ADAPTERS_CONSTRAINT"
          export VIRTUAL_ENV="$SMOKE_ENV"
          export PATH="$SMOKE_ENV/bin:$PATH"
          uv --version
          python - <<'PY'
          import importlib.metadata as metadata
          import platform
          import sys
          from packaging.version import Version

          expected_python = "3.13"
          expected = {
              "dbt-core": "{{.ITEM.dbt_version}}",
              "dbt-duckdb": "{{.ITEM.dbt_duckdb_version}}",
          }
          minimum = {
              "dbt-adapters": "1.16.3",
          }

          print(f"python: {sys.version}")
          print(f"python executable: {sys.executable}")
          assert platform.python_version().startswith(expected_python + "."), platform.python_version()

          for package in ("dbt-core", "dbt-duckdb", "dbt-adapters", "dbt-osmosis"):
              version = metadata.version(package)
              print(f"{package}: {version}")
              if package in expected:
                  expected_prefix = ".".join(expected[package].split(".")[:2]) + "."
                  assert version.startswith(expected_prefix), f"{package} {version} does not match {expected_prefix}x"
              if package in minimum:
                  assert Version(version) >= Version(minimum[package]), f"{package} {version} is below {minimum[package]}"
          PY
          uv --no-config pip check --python "$SMOKE_ENV/bin/python"
          basedpyright --outputjson > /tmp/dbt-osmosis-basedpyright.json || true
          python -c "import json, pathlib, sys; summary = json.loads(pathlib.Path('/tmp/dbt-osmosis-basedpyright.json').read_text())['summary']; print('basedpyright summary:', summary['errorCount'], 'errors,', summary['warningCount'], 'warnings'); sys.exit(1 if summary['errorCount'] else 0)"
          dbt --version
          dbt parse --project-dir demo_duckdb --profiles-dir demo_duckdb -t test
          dbt-osmosis --help
          python -c "import dbt_osmosis; import dbt_osmosis.cli.main"
          pytest -q
      - for:
          matrix:
            dbt_version: ["1.11.0"]
            dbt_duckdb_version: ["1.10.1"]
        cmd: |
          echo -e "\033[32mtask: [test-latest-core-compat] validate dbt-core~={{.ITEM.dbt_version}} with dbt-duckdb~={{.ITEM.dbt_duckdb_version}}\033[0m"
          export UV_PYTHON=3.13
          SMOKE_ENV=$(mktemp -d)/dbt-osmosis-smoke
          uv venv "$SMOKE_ENV"
          uv --no-config pip install --python "$SMOKE_ENV/bin/python" -e ".[dev,openai]" "dbt-core~={{.ITEM.dbt_version}}" "dbt-duckdb~={{.ITEM.dbt_duckdb_version}}" "$DBT_ADAPTERS_CONSTRAINT"
          export VIRTUAL_ENV="$SMOKE_ENV"
          export PATH="$SMOKE_ENV/bin:$PATH"
          uv --version
          python - <<'PY'
          import importlib.metadata as metadata
          import platform
          import sys
          from packaging.version import Version

          expected_python = "3.13"
          expected = {
              "dbt-core": "{{.ITEM.dbt_version}}",
              "dbt-duckdb": "{{.ITEM.dbt_duckdb_version}}",
          }
          minimum = {
              "dbt-adapters": "1.16.3",
          }

          print(f"python: {sys.version}")
          print(f"python executable: {sys.executable}")
          assert platform.python_version().startswith(expected_python + "."), platform.python_version()

          for package in ("dbt-core", "dbt-duckdb", "dbt-adapters", "dbt-osmosis"):
              version = metadata.version(package)
              print(f"{package}: {version}")
              if package in expected:
                  expected_prefix = ".".join(expected[package].split(".")[:2]) + "."
                  assert version.startswith(expected_prefix), f"{package} {version} does not match {expected_prefix}x"
              if package in minimum:
                  assert Version(version) >= Version(minimum[package]), f"{package} {version} is below {minimum[package]}"
          PY
          uv --no-config pip check --python "$SMOKE_ENV/bin/python"
          basedpyright --outputjson > /tmp/dbt-osmosis-basedpyright.json || true
          python -c "import json, pathlib, sys; summary = json.loads(pathlib.Path('/tmp/dbt-osmosis-basedpyright.json').read_text())['summary']; print('basedpyright summary:', summary['errorCount'], 'errors,', summary['warningCount'], 'warnings'); sys.exit(1 if summary['errorCount'] else 0)"
          dbt --version
          dbt parse --project-dir demo_duckdb --profiles-dir demo_duckdb -t test
          dbt-osmosis --help
          python -c "import dbt_osmosis; import dbt_osmosis.cli.main"
          pytest -q

  pip-install-smoke:
    desc: Validate published package metadata with pip outside uv resolution
    cmds:
      - |
        SMOKE_ENV=$(mktemp -d)/dbt-osmosis-pip-smoke
        python -m venv "$SMOKE_ENV"
        export VIRTUAL_ENV="$SMOKE_ENV"
        export PATH="$SMOKE_ENV/bin:$PATH"
        python -m pip install --upgrade pip
        python -m pip install ".[openai]" "dbt-core~=1.11.0" "dbt-duckdb~=1.10.1"
        python -m pip check
        python - <<'PY'
        import importlib.metadata as metadata
        import platform
        import sys

        print(f"python: {sys.version}")
        print(f"python executable: {sys.executable}")
        print(f"python platform version: {platform.python_version()}")

        expected = {
            "dbt-core": "1.11.",
            "dbt-duckdb": "1.10.",
        }
        for package in ("dbt-core", "dbt-duckdb", "dbt-adapters", "dbt-osmosis"):
            version = metadata.version(package)
            print(f"{package}: {version}")
            if package in expected:
                assert version.startswith(expected[package]), f"{package} {version} does not match {expected[package]}x"
        PY
        dbt-osmosis --help
        python -c "import dbt_osmosis; import dbt_osmosis.cli.main"

  mutation-test:
    desc: Run mutation testing with mutmut (ensures tests catch bugs)
    cmds:
      - echo "Running mutation testing with mutmut..."
      - uvx mutmut run --paths-to-mutate src/dbt_osmosis/core/ --runner pytest --no-coverage --max-workers 4

  mutation-results:
    desc: Show mutation testing results
    cmds:
      - uvx mutmut results

  mutation-html:
    desc: Generate HTML report for mutation testing
    cmds:
      - uvx mutmut html
