repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-ast
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key
      - id: debug-statements
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.1.0
    hooks:
      - id: commitizen
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff-format
        args: ["--preview"]
      - id: ruff
        args: [--fix]
  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright
        entry: >
          bash -c "uv run --with 'openai~=1.58.1' --with 'azure-identity>=1.19,<2'
          basedpyright --outputjson > /tmp/dbt-osmosis-basedpyright-precommit.json || true;
          python -c 'import json, pathlib, sys; summary = json.loads(pathlib.Path(\"/tmp/dbt-osmosis-basedpyright-precommit.json\").read_text())[\"summary\"]; print(\"basedpyright summary:\", summary[\"errorCount\"], \"errors,\", summary[\"warningCount\"], \"warnings\"); sys.exit(1 if summary[\"errorCount\"] else 0)'"
        language: system
        pass_filenames: false
        always_run: true
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.5
    hooks:
      - id: actionlint
