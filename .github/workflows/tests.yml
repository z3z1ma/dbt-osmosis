name: Tests

on:
  - push
  - pull_request

jobs:
  tests:
    name: Run pytest
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        dbt-version: ["1.8.0", "1.9.0", "1.10.0"]
        exclude:
          - python-version: "3.13"
            dbt-version: "1.8.0"
          - python-version: "3.13"
            dbt-version: "1.9.0"

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4.1.1

      - name: Set up Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Upgrade pip
        run: |
          pip install --constraint=.github/workflows/constraints.txt pip
          pip --version

      - name: Install uv
        run: |
          pip install --constraint=.github/workflows/constraints.txt uv
          uv --version

      - name: Install required packages
        run: | # install dev and openai extras to be able to parse manifest and run all tests
          uv sync --extra dev --extra openai

      - name: Install dbt runtime
        run: |
          uv pip install "dbt-core~=${{ matrix.dbt-version }}" "dbt-duckdb~=${{ matrix.dbt-version }}"

      - name: Parse manifest
        run: |
          uv run dbt parse --project-dir demo_duckdb --profiles-dir demo_duckdb -t test

      - name: Run pytest
        run: |
          uv run pytest

      - name: Run integration tests
        working-directory: demo_duckdb
        run: |
          bash -x integration_tests.sh

  latest-core-smoke:
    name: Smoke install on latest dbt-core
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4.1.1

      - name: Set up Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: "3.13"

      - name: Upgrade pip
        run: |
          pip install --constraint=.github/workflows/constraints.txt pip
          pip --version

      - name: Install uv
        run: |
          pip install --constraint=.github/workflows/constraints.txt uv
          uv --version

      - name: Smoke-test package installability and adapter-free compatibility on latest dbt-core
        run: |
          SMOKE_ENV=$(mktemp -d)/dbt-osmosis-smoke
          uv venv "$SMOKE_ENV"
          uv pip install --python "$SMOKE_ENV/bin/python" "dbt-core~=1.11.0" basedpyright pytest pytest-cov hypothesis .
          "$SMOKE_ENV/bin/basedpyright" --level error
          "$SMOKE_ENV/bin/dbt-osmosis" --help
          "$SMOKE_ENV/bin/python" -c "import dbt_osmosis; import dbt_osmosis.cli.main"
          "$SMOKE_ENV/bin/pytest" tests/core/test_cli.py tests/core/test_legacy.py tests/core/test_logger.py -q
